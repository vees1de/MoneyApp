name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
        run: |
          required_base=(DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY)
          for key in "${required_base[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing GitHub secret: ${key}" >&2
              exit 1
            fi
          done

          if [ -n "${DEPLOY_ENV}" ]; then
            exit 0
          fi

          required_fallback=(POSTGRES_PASSWORD AUTH_JWT_SECRET)
          for key in "${required_fallback[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing GitHub secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Write deploy env file
        shell: bash
        env:
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
        run: |
          if [ -n "${DEPLOY_ENV}" ]; then
            printf '%s\n' "${DEPLOY_ENV}" > .env
            exit 0
          fi

          cat > .env <<EOF
          APP_ENV=production
          APP_PORT=${{ secrets.APP_PORT || '8080' }}

          POSTGRES_DB=${{ secrets.POSTGRES_DB || 'moneyapp' }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER || 'moneyapp' }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

          AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}
          AUTH_JWT_ISSUER=${{ secrets.AUTH_JWT_ISSUER || 'moneyapp' }}
          AUTH_ACCESS_TOKEN_TTL=${{ secrets.AUTH_ACCESS_TOKEN_TTL || '15m' }}
          AUTH_REFRESH_TOKEN_TTL=${{ secrets.AUTH_REFRESH_TOKEN_TTL || '720h' }}
          AUTH_ALLOW_INSECURE_DEV_AUTH=${{ secrets.AUTH_ALLOW_INSECURE_DEV_AUTH || 'false' }}

          DEFAULT_BASE_CURRENCY=${{ secrets.DEFAULT_BASE_CURRENCY || 'RUB' }}
          DEFAULT_TIMEZONE=${{ secrets.DEFAULT_TIMEZONE || 'Europe/Moscow' }}
          DEFAULT_WEEKLY_REVIEW_HOUR=${{ secrets.DEFAULT_WEEKLY_REVIEW_HOUR || '18' }}

          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          YANDEX_CLIENT_ID=${{ secrets.YANDEX_CLIENT_ID }}
          EOF

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          readonly DEPLOY_PORT=22
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [ -n "${DEPLOY_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${DEPLOY_PORT}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Run deploy
        shell: bash
        run: |
          chmod +x deploy/deploy_host_ssh.sh
          ./deploy/deploy_host_ssh.sh deploy-target
