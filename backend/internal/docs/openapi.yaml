openapi: 3.1.0
info:
  title: MoneyApp Learning Platform API
  version: 2.1.0
  summary: Frontend-oriented contract for the LMS/L&D backend
  description: |
    HTTP API for the MoneyApp Learning Platform backend.

    This spec is written for frontend integration:
    - all timestamps are RFC3339 strings
    - all numeric values coming from PostgreSQL are serialized as strings
    - protected routes require `Authorization: Bearer <access_token>`
    - role- and permission-based UI should use `/api/v1/auth/me`
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Admin
  - name: Catalog
  - name: Learning
  - name: Testing
  - name: Certificates
  - name: External Training
  - name: Workflows
  - name: Budget
  - name: Integrations
  - name: Notifications
  - name: University
  - name: Analytics
  - name: Audit
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      security: []
      responses:
        '200':
          description: Dependencies are ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Dependency is degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Self-register a new employee
      description: Creates the user, a default employee profile, assigns the `employee` role, and returns tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered and authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access and refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token pair rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Logged out
  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Start password reset flow
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '204':
          description: Reset request accepted
  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Finish password reset flow
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Password updated
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user, roles, permissions, and employee profile
      responses:
        '200':
          description: Authenticated principal snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/admin/users:
    get:
      tags: [Admin]
      summary: List all users
      description: Frontend admin panel entry point for user management.
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Admin]
      summary: Create user from admin panel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserView'
  /api/v1/admin/users/{id}:
    get:
      tags: [Admin]
      summary: Get one user
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserView'
    patch:
      tags: [Admin]
      summary: Update user profile and status
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserView'
  /api/v1/admin/users/{id}/roles:
    post:
      tags: [Admin]
      summary: Assign role to user
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRoleRequest'
      responses:
        '204':
          description: Role assigned
  /api/v1/admin/users/{id}/roles/{roleId}:
    delete:
      tags: [Admin]
      summary: Remove role from user
      parameters:
        - $ref: '#/components/parameters/EntityID'
        - in: path
          name: roleId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Role removed
  /api/v1/admin/roles:
    get:
      tags: [Admin]
      summary: List roles
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListResponse'
  /api/v1/admin/permissions:
    get:
      tags: [Admin]
      summary: List permissions
      responses:
        '200':
          description: Permission list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListResponse'

  /api/v1/courses:
    get:
      tags: [Catalog]
      summary: List courses
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: status
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: direction_id
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
        - in: query
          name: category_id
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
        - in: query
          name: level
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: language
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: source_type
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: is_mandatory_default
          schema:
            type: boolean
        - in: query
          name: sort
          schema:
            type: string
            enum: [relevance, newest, updated, title_asc, title_desc, duration_asc, duration_desc]
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        '200':
          description: Courses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseListResponse'
    post:
      tags: [Catalog]
      summary: Create draft course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseRequest'
      responses:
        '201':
          description: Draft course created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
  /api/v1/courses/{id}:
    get:
      tags: [Catalog]
      summary: Get course
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
    patch:
      tags: [Catalog]
      summary: Update course
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCourseRequest'
      responses:
        '200':
          description: Updated course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
  /api/v1/courses/{id}/publish:
    post:
      tags: [Catalog]
      summary: Publish course
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Published course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
  /api/v1/courses/{id}/archive:
    post:
      tags: [Catalog]
      summary: Archive course
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Archived course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
  /api/v1/courses/{id}/materials:
    get:
      tags: [Catalog]
      summary: List course materials
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Material list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseMaterialListResponse'
    post:
      tags: [Catalog]
      summary: Create course material
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseMaterialRequest'
      responses:
        '201':
          description: Material created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseMaterial'

  /api/v1/assignments:
    get:
      tags: [Learning]
      summary: List assignments
      responses:
        '200':
          description: Assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentListResponse'
    post:
      tags: [Learning]
      summary: Create assignment and generate enrollments
      description: Use this when HR or manager assigns training to a user, department, or group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssignmentRequest'
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
  /api/v1/enrollments/my:
    get:
      tags: [Learning]
      summary: List current user enrollments
      responses:
        '200':
          description: Enrollments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentListResponse'
  /api/v1/enrollments/{id}:
    get:
      tags: [Learning]
      summary: Get enrollment
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Enrollment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
  /api/v1/enrollments/{id}/start:
    post:
      tags: [Learning]
      summary: Mark enrollment as started
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Enrollment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
  /api/v1/enrollments/{id}/progress:
    post:
      tags: [Learning]
      summary: Update module progress
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEnrollmentProgressRequest'
      responses:
        '200':
          description: Enrollment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
  /api/v1/enrollments/{id}/complete:
    post:
      tags: [Learning]
      summary: Complete enrollment
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteEnrollmentRequest'
      responses:
        '200':
          description: Enrollment completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'

  /api/v1/learning-plan/my:
    get:
      tags: [Learning]
      summary: Get current user learning plan
      responses:
        '200':
          description: Learning plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyLearningPlan'
  /api/v1/recommendations/courses:
    get:
      tags: [Learning]
      summary: Get recommended courses for current user
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        '200':
          description: Recommended courses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendedCourseListResponse'

  /api/v1/tests:
    post:
      tags: [Testing]
      summary: Create test
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTestRequest'
      responses:
        '201':
          description: Test created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Test'
  /api/v1/tests/{id}:
    get:
      tags: [Testing]
      summary: Get test with questions and options
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Test
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Test'
  /api/v1/tests/{id}/attempts:
    post:
      tags: [Testing]
      summary: Start attempt
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAttemptRequest'
      responses:
        '201':
          description: Attempt started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestAttempt'
  /api/v1/test-attempts/{id}/answers:
    post:
      tags: [Testing]
      summary: Save answers for an attempt
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveAnswersRequest'
      responses:
        '204':
          description: Answers saved
  /api/v1/test-attempts/{id}/submit:
    post:
      tags: [Testing]
      summary: Submit attempt and calculate result
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Attempt checked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestAttempt'
  /api/v1/tests/{id}/results:
    get:
      tags: [Testing]
      summary: List aggregated test results
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Result list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResultListResponse'

  /api/v1/certificates/upload:
    post:
      tags: [Certificates]
      summary: Upload certificate file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadCertificateRequest'
      responses:
        '201':
          description: Certificate created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
  /api/v1/certificates/my:
    get:
      tags: [Certificates]
      summary: List current user certificates
      responses:
        '200':
          description: Certificate list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateListResponse'
  /api/v1/certificates/{id}/verify:
    post:
      tags: [Certificates]
      summary: Verify certificate
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '200':
          description: Certificate verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
  /api/v1/certificates/{id}/reject:
    post:
      tags: [Certificates]
      summary: Reject certificate
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '200':
          description: Certificate rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'

  /api/v1/external-requests:
    get:
      tags: [External Training]
      summary: List external training requests with filters
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [my, team, all]
        - in: query
          name: status
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: assignee
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        '200':
          description: External request list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequestListResponse'
    post:
      tags: [External Training]
      summary: Create external training request draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExternalRequestRequest'
      responses:
        '201':
          description: Draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequest'
  /api/v1/external-requests/my:
    get:
      tags: [External Training]
      summary: List current user external requests
      responses:
        '200':
          description: External request list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequestListResponse'
  /api/v1/external-requests/pending-approvals:
    get:
      tags: [External Training]
      summary: List current user pending external approvals
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        '200':
          description: Pending approval list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequestPendingApprovalListResponse'
  /api/v1/external-requests/{id}:
    get:
      tags: [External Training]
      summary: Get external request
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: External request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequest'
    patch:
      tags: [External Training]
      summary: Update external request draft or revision
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExternalRequestRequest'
      responses:
        '200':
          description: Updated external request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequest'
  /api/v1/external-requests/{id}/submit:
    post:
      tags: [External Training]
      summary: Submit request into approval flow
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Submitted request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequest'
  /api/v1/external-requests/{id}/approve:
    post:
      tags: [External Training]
      summary: Approve current approval step
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '200':
          description: Request status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequest'
  /api/v1/external-requests/{id}/reject:
    post:
      tags: [External Training]
      summary: Reject current approval step
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '200':
          description: Request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequest'
  /api/v1/external-requests/{id}/request-revision:
    post:
      tags: [External Training]
      summary: Return request to author for revision
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '200':
          description: Request sent to revision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequest'
  /api/v1/external-requests/{id}/upload-certificate:
    post:
      tags: [External Training]
      summary: Upload certificate file metadata after external training
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadRequestCertificateRequest'
      responses:
        '200':
          description: Request updated to `certificate_uploaded`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRequest'

  /api/v1/approval-workflows:
    get:
      tags: [Workflows]
      summary: List approval workflows
      responses:
        '200':
          description: Workflow list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalWorkflowListResponse'
    post:
      tags: [Workflows]
      summary: Create approval workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApprovalWorkflowRequest'
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalWorkflow'

  /api/v1/budget-limits:
    get:
      tags: [Budget]
      summary: List budget limits
      responses:
        '200':
          description: Budget limit list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetLimitListResponse'
    post:
      tags: [Budget]
