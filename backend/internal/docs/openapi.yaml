components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    EntityID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid payload or state transition
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Missing permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Business conflict or invalid state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
          required: [code, message]
      required: [error]
    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ReadyResponse:
      type: object
      properties:
        status:
          type: string
        dependencies:
          type: object
          additionalProperties:
            type: string
      required: [status, dependencies]
    GenericObject:
      type: object
      additionalProperties: true
    ItemListGenericResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GenericObject'
      required: [items]
    Tokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
      required: [access_token, refresh_token, expires_in]
    EmployeeProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        employee_no:
          type: string
          nullable: true
        first_name:
          type: string
        last_name:
          type: string
        middle_name:
          type: string
          nullable: true
        position_title:
          type: string
          nullable: true
        department_id:
          type: string
          format: uuid
          nullable: true
        employment_status:
          type: string
        timezone:
          type: string
          nullable: true
        outlook_email:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - first_name
        - last_name
        - employment_status
        - created_at
        - updated_at
    UserView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        status:
          type: string
        is_email_verified:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        employee_profile:
          $ref: '#/components/schemas/EmployeeProfile'
      required:
        - id
        - email
        - status
        - is_email_verified
        - created_at
        - updated_at
        - roles
        - permissions
    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserView'
        tokens:
          $ref: '#/components/schemas/Tokens'
        meta:
          type: object
          additionalProperties: true
      required: [user, tokens]
    MeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserView'
      required: [user]
    UserListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserView'
      required: [items]
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        is_system:
          type: boolean
      required: [id, code, name, is_system]
    RoleListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Role'
      required: [items]
    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        module:
          type: string
        action:
          type: string
        description:
          type: string
          nullable: true
      required: [id, code, module, action]
    PermissionListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
      required: [items]
    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        source_type:
          type: string
        title:
          type: string
        slug:
          type: string
          nullable: true
        short_description:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        provider_id:
          type: string
          format: uuid
          nullable: true
        category_id:
          type: string
          format: uuid
          nullable: true
        direction_id:
          type: string
          format: uuid
          nullable: true
        level:
          type: string
          nullable: true
        duration_hours:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        is_mandatory_default:
          type: boolean
        status:
          type: string
        thumbnail_file_id:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
        published_at:
