openapi: 3.1.0
info:
  title: MoneyApp Finance Core API
  version: 1.0.0
  summary: Personal Life OS finance MVP backend
  description: |
    HTTP API for the MoneyApp finance core.

    Notes for local testing:
    - All money values are strings, not numbers, to preserve decimal precision.
    - Telegram auth expects a signed payload from the Telegram Login Widget and verifies it using `TELEGRAM_BOT_TOKEN`.
    - In development, when `AUTH_ALLOW_INSECURE_DEV_AUTH=true`, Telegram and Yandex auth endpoints can work in pass-through mode.
    - Protected endpoints use Bearer auth with the access token returned by login.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Accounts
  - name: Categories
  - name: Transactions
  - name: Transfers
  - name: Savings
  - name: Weekly Review
  - name: Dashboard
  - name: Links
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Application is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      security: []
      responses:
        '200':
          description: Application is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/auth/telegram:
    post:
      tags: [Auth]
      summary: Login with Telegram
      description: |
        Accepts a signed payload from the Telegram Login Widget and returns JWT + refresh tokens.
      operationId: authTelegram
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramLoginRequest'
            examples:
              widget:
                value:
                  provider_user_id: '987654321'
                  username: veeside
                  first_name: Vee
                  last_name: Side
                  photo_url: https://example.com/avatar.png
                  auth_date: 1711111111
                  hash: 0d3d830abf3f6a7f0f1f72dd9a1b88e7e0b1b6d9bc52f3d441fa4f0e7fa7c2ce
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/yandex:
    post:
      tags: [Auth]
      summary: Login with Yandex
      description: |
        In development mode, this endpoint accepts provider identity fields directly.
      operationId: authYandex
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YandexLoginRequest'
            examples:
              localDev:
                value:
                  provider_user_id: yandex_10001
                  email: dev@example.com
                  display_name: Dev User
                  avatar_url: https://example.com/avatar.png
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token pair
      operationId: authRefresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token session
      operationId: authLogout
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logged out
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user
      operationId: authMe
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Current user profile
      operationId: usersMe
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/preferences:
    patch:
      tags: [Users]
      summary: Update user preferences
      operationId: updateUserPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
            examples:
              default:
                value:
                  timezone: Asia/Yakutsk
                  base_currency: RUB
                  onboarding_completed: true
                  weekly_review_weekday: 1
                  weekly_review_hour: 19
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/accounts:
    get:
      tags: [Accounts]
      summary: List accounts
      operationId: listAccounts
      responses:
        '200':
          description: Accounts list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Accounts]
      summary: Create account
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
            examples:
              cash:
                value:
                  name: Main Card
                  kind: bank_card
                  currency: RUB
                  opening_balance: '42300.00'
      responses:
        '201':
          description: Created account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/accounts/{id}:
    get:
      tags: [Accounts]
      summary: Get account by ID
      operationId: getAccount
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Accounts]
      summary: Update account
      operationId: updateAccount
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/finance/categories:
    get:
      tags: [Categories]
      summary: List system and user categories
      operationId: listCategories
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Categories]
      summary: Create custom category
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
            examples:
              expense:
                value:
                  kind: expense
                  name: Pets
                  color: '#FFB703'
                  icon: paw-print
      responses:
        '201':
          description: Created category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/finance/categories/{id}:
    patch:
      tags: [Categories]
      summary: Update category
      operationId: updateCategory
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Updated category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Categories]
      summary: Archive category
      operationId: deleteCategory
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '204':
          description: Category archived
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/finance/transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      operationId: listTransactions
      parameters:
        - name: account
          in: query
          schema:
            type: string
            format: uuid
        - name: category
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TransactionType'
        - name: posting_state
          in: query
          schema:
            $ref: '#/components/schemas/TransactionPostingState'
        - name: source
          in: query
          schema:
            $ref: '#/components/schemas/TransactionSource'
        - name: linked_entity_type
          in: query
          schema:
            type: string
        - name: linked_entity_id
          in: query
          schema:
            type: string
            format: uuid
        - name: date_from
          in: query
          schema:
            type: string
            format: date-time
        - name: date_to
          in: query
          schema:
            type: string
            format: date-time
        - name: include_deleted
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Transactions]
      summary: Create transaction
      operationId: createTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
            examples:
              expense:
                value:
                  account_id: 11111111-1111-1111-1111-111111111111
                  type: expense
                  category_id: 0c3518d6-9e34-4ab2-8e5c-4558b2fbf101
                  amount: '1450.00'
                  currency: RUB
                  title: Groceries
                  note: Weekly supermarket run
                  occurred_at: '2026-03-22T09:00:00Z'
              transfer:
                value:
                  account_id: 11111111-1111-1111-1111-111111111111
                  transfer_account_id: 22222222-2222-2222-2222-222222222222
                  type: transfer
                  amount: '5000.00'
                  currency: RUB
                  occurred_at: '2026-03-22T10:00:00Z'
      responses:
        '201':
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/finance/transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get transaction by ID
      operationId: getTransaction
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Transactions]
      summary: Update transaction
      operationId: updateTransaction
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequest'
      responses:
        '200':
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Transactions]
      summary: Soft delete transaction
      operationId: deleteTransaction
      parameters:
        - $ref: '#/components/parameters/EntityID'
        - name: reason
          in: query
          schema:
            type: string
      responses:
        '204':
          description: Deleted transaction
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/finance/transactions/{id}/restore:
    post:
      tags: [Transactions]
      summary: Restore soft deleted transaction
      operationId: restoreTransaction
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Restored transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/finance/transfers:
    post:
      tags: [Transfers]
      summary: Create account transfer
      operationId: createTransfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
      responses:
        '201':
          description: Created transfer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/finance/transfers/{id}:
    patch:
      tags: [Transfers]
      summary: Update transfer
      operationId: updateTransfer
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransferRequest'
      responses:
        '200':
          description: Updated transfer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Transfers]
      summary: Soft delete transfer
      operationId: deleteTransfer
      parameters:
        - $ref: '#/components/parameters/EntityID'
        - name: reason
          in: query
          schema:
            type: string
      responses:
        '204':
          description: Deleted transfer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/finance/transfers/{id}/restore:
    post:
      tags: [Transfers]
      summary: Restore soft deleted transfer
      operationId: restoreTransfer
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Restored transfer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/savings/goals:
    get:
      tags: [Savings]
      summary: List savings goals
      operationId: listSavingsGoals
      responses:
        '200':
          description: Savings goals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsGoalsListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Savings]
      summary: Create savings goal
      operationId: createSavingsGoal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGoalRequest'
            examples:
              goal:
                value:
                  title: Emergency Fund
                  target_amount: '150000.00'
                  current_amount: '38000.00'
                  currency: RUB
                  target_date: '2026-12-31T00:00:00Z'
                  priority: high
      responses:
        '201':
          description: Created savings goal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsGoal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/savings/goals/{id}:
    patch:
      tags: [Savings]
      summary: Update savings goal
      operationId: updateSavingsGoal
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGoalRequest'
      responses:
        '200':
          description: Updated savings goal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsGoal'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/savings/summary:
    get:
      tags: [Savings]
      summary: Savings summary and safe-to-spend
      operationId: getSavingsSummary
      responses:
        '200':
          description: Savings summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/reviews/weekly/current:
    get:
      tags: [Weekly Review]
      summary: Get or prepare current weekly review
      operationId: getCurrentWeeklyReview
      responses:
        '200':
          description: Current weekly review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyReview'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/reviews/weekly/{id}/submit-balance:
    post:
      tags: [Weekly Review]
      summary: Submit actual balance for weekly review
      operationId: submitWeeklyReviewBalance
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitBalanceRequest'
            examples:
              discrepancy:
                value:
                  actual_balance: '42300.00'
      responses:
        '200':
          description: Updated weekly review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyReview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/reviews/weekly/{id}/resolve:
    post:
      tags: [Weekly Review]
      summary: Mark weekly review as resolved
      operationId: resolveWeeklyReview
      parameters:
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveRequest'
            examples:
              manual:
                value:
                  resolution_note: Manual verification completed after checking latest transactions
      responses:
        '200':
          description: Resolved weekly review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyReview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/reviews/weekly/{id}/skip:
    post:
      tags: [Weekly Review]
      summary: Skip weekly review
      operationId: skipWeeklyReview
      parameters:
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Skipped weekly review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyReview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/dashboard/finance:
    get:
      tags: [Dashboard]
      summary: Finance dashboard aggregate
      operationId: getFinanceDashboard
      responses:
        '200':
          description: Finance dashboard snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceDashboard'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/links:
    post:
      tags: [Links]
      summary: Create typed entity link
      operationId: createLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
            examples:
              transactionNote:
                value:
                  source_type: transaction
                  source_id: 33333333-3333-3333-3333-333333333333
                  target_type: note
                  target_id: 44444444-4444-4444-4444-444444444444
                  relation: relates_to
                  meta:
                    label: Why I bought this
      responses:
        '201':
          description: Link created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityLink'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/links/by-entity:
    get:
      tags: [Links]
      summary: List links for entity
      operationId: listLinksByEntity
      parameters:
        - name: entity_type
          in: query
          required: true
          schema:
            type: string
          description: Entity type, for example `transaction`, `note`, `income`, `expense`
        - name: entity_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Links for entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinksListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    EntityID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    BadRequest:
      description: Invalid request payload or query parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Request is authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    Money:
      type: string
      description: Decimal monetary value serialized as string
      pattern: '^-?\d+(\.\d{2})?$'
      examples: ['42300.00']

    Meta:
      type: object
      additionalProperties: true

    HealthResponse:
