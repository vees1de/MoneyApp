services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moneyapp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-moneyapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./backend/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        psql "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-moneyapp}?sslmode=disable" -v ON_ERROR_STOP=1 <<'SQL'
        create table if not exists schema_migrations (
          version text primary key,
          applied_at timestamptz not null default now()
        );
        SQL

        for file in /migrations/*.sql; do
          version="$$(basename "$${file}")";
          applied="$$(psql "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-moneyapp}?sslmode=disable" -tA -v ON_ERROR_STOP=1 -c "select 1 from schema_migrations where version = '$${version}'")";
          if [ "$${applied}" = "1" ]; then
            echo "skipping $${version}";
            continue;
          fi

          echo "applying $${version}";
          psql "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-moneyapp}?sslmode=disable" -v ON_ERROR_STOP=1 -f "$${file}";
          psql "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-moneyapp}?sslmode=disable" -v ON_ERROR_STOP=1 -c "insert into schema_migrations(version) values ('$${version}')";
        done

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: :8080
      FRONTEND_DIST_DIR: /app/frontend-dist
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
