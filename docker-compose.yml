services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moneyapp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-moneyapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB:-moneyapp}
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./backend/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-e", "-c"]
    command:
      - |
        echo "waiting for postgres auth..."
        for i in $$(seq 1 30); do
          psql -c "select 1" > /dev/null 2>&1 && break
          echo "  attempt $$i/30 failed, retrying in 2s..."
          sleep 2
          if [ "$$i" = "30" ]; then
            echo "ERROR: could not connect to postgres after 30 attempts" >&2
            psql -c "select 1" >&2
            exit 1
          fi
        done
        echo "connected"

        psql -v ON_ERROR_STOP=1 -c "create table if not exists schema_migrations (version text primary key, applied_at timestamptz not null default now())"

        for f in /migrations/*.sql; do
          [ -f "$$f" ] || continue
          ver=$$(basename "$$f")
          applied=$$(psql -tAX -c "select 1 from schema_migrations where version='$$ver'" 2>/dev/null || echo "")
          if [ "$$applied" = "1" ]; then
            echo "skip $$ver"
            continue
          fi
          echo "apply $$ver"
          psql -v ON_ERROR_STOP=1 -f "$$f"
          psql -v ON_ERROR_STOP=1 -c "insert into schema_migrations(version) values('$$ver')"
        done
        echo "all migrations done"

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
        VITE_YANDEX_CLIENT_ID: ${VITE_YANDEX_CLIENT_ID:-}
        VITE_YANDEX_REDIRECT_URI: ${VITE_YANDEX_REDIRECT_URI:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: :8080
      FRONTEND_DIST_DIR: /app/frontend-dist
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
        VITE_YANDEX_CLIENT_ID: ${VITE_YANDEX_CLIENT_ID:-}
        VITE_YANDEX_REDIRECT_URI: ${VITE_YANDEX_REDIRECT_URI:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: :8080
      FRONTEND_DIST_DIR: /app/frontend-dist
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    command: ["./worker"]

volumes:
  postgres_data:
