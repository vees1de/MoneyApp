<aside class="sidebar">
  <h2 class="sidebar__title">Navigation</h2>

  <nav class="sidebar__nav">
    @for (item of navItems(); track item.route) {
      <a
        class="sidebar__link"
        [routerLink]="item.route"
        routerLinkActive="sidebar__link--active"
      >
        {{ item.label }}
      </a>
    }
  </nav>
</aside>
