<h2 mat-dialog-title>Сотрудники</h2>

<mat-dialog-content class="application-focus-dialog">
  <mat-selection-list [multiple]="false" (selectionChange)="select($event)">
    @for (application of data.applications; track application.id) {
      <mat-list-option
        [value]="application.id"
        [selected]="application.id === selectedApplicationId()"
      >
        <div class="application-focus-dialog__item-title">{{ application.applicantLabel }}</div>
        <div class="application-focus-dialog__item-subtitle">{{ application.statusLabel }}</div>
      </mat-list-option>
    }
  </mat-selection-list>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cancel()">Отмена</button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    (click)="confirm()"
    [disabled]="!selectedApplicationId()"
  >
    OK
  </button>
</mat-dialog-actions>
