<section class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Вход</mat-card-title>
      <mat-card-subtitle>Войдите в личный кабинет</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
        <mat-form-field appearance="outline">
          <mat-label>Логин (email)</mat-label>
          <input matInput formControlName="email" autocomplete="username" />
          @if (emailError()) {
            <mat-error>{{ emailError() }}</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Пароль</mat-label>
          <input
            matInput
            type="password"
            formControlName="password"
            autocomplete="current-password"
          />
          @if (passwordError()) {
            <mat-error>{{ passwordError() }}</mat-error>
          }
        </mat-form-field>

        @if (authError()) {
          <p class="login-error">{{ authError() }}</p>
        }

        <button mat-flat-button type="submit" [disabled]="submitting()">
          {{ submitting() ? 'Входим...' : 'Войти' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</section>
