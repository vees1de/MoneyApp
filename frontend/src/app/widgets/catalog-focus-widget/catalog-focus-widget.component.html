<app-widget-shell title="Фокус недели">
  <section class="focus-widget">
    <p class="focus-widget__title">Data & Product</p>
    <p class="focus-widget__copy">
      2 курса в подборке на неделю: аналитика продукта и управление гипотезами.
    </p>

    <div class="focus-widget__stats">
      <div class="focus-widget__stat">
        <span>План</span>
        <strong>12 ч</strong>
      </div>
      <div class="focus-widget__stat">
        <span>Закрыто</span>
        <strong>7 ч</strong>
      </div>
      <div class="focus-widget__stat">
        <span>Осталось</span>
        <strong>5 ч</strong>
      </div>
    </div>

    <div class="focus-widget__progress">
      <div class="focus-widget__progress-fill"></div>
    </div>

    <ul class="focus-widget__checklist">
      <li>
        <mat-icon>check_circle</mat-icon>
        Интервью и выявление ценности
      </li>
      <li>
        <mat-icon>schedule</mat-icon>
        SQL для продуктовой аналитики
      </li>
    </ul>
  </section>
</app-widget-shell>
