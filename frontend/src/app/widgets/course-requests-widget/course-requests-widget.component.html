<app-widget-shell
  title="Заявления"
  listRoute="/external-requests"
  [loading]="loading()"
  [error]="error()"
  [empty]="cards().length === 0"
>
  <div class="filters">
    @for (status of statuses; track status.key) {
      <button
        type="button"
        class="filters__item"
        [class.filters__item--active]="selectedStatus() === status.key"
        (click)="setStatus(status.key)"
      >
        {{ status.label }}
        <span>{{ statusCount(status.key) }}</span>
      </button>
    }
  </div>

  <div class="rows">
    @for (item of filteredCards(); track item.id) {
      <mat-card class="rows__item">
        <div class="rows__identity">
          <a [routerLink]="'/external-requests/' + item.id">
            <strong>{{ item.employee }}</strong>
          </a>
          <small>{{ item.subtitle }}</small>
        </div>

        <div class="rows__course">
          <strong>{{ item.title }}</strong>
          <small>{{ item.status }}</small>
        </div>

        <div class="rows__amount">{{ item.amount }}</div>

        <div class="rows__action">
          <a mat-flat-button [routerLink]="'/external-requests/' + item.id">Перейти к заявлению</a>
        </div>
      </mat-card>
    } @empty {
      <p class="rows__empty">По выбранному фильтру заявлений нет.</p>
    }
  </div>
</app-widget-shell>
