<app-widget-shell
  title="Заявки на курс"
  listRoute="/external-requests"
  [loading]="loading()"
  [error]="error()"
  [empty]="cards().length === 0"
>
  <div class="cards">
    @for (item of cards(); track item.id) {
      <mat-card>
        <a [routerLink]="'/external-requests/' + item.id">
          {{ item.title }} / {{ item.subtitle }}
        </a>
      </mat-card>
    }
  </div>
</app-widget-shell>
