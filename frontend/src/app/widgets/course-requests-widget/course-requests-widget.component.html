<app-widget-shell
  title="Заявки на курс"
  listRoute="/external-requests"
  [loading]="loading()"
  [error]="error()"
  [empty]="requests().length === 0"
>
  <div class="cards">
    @for (item of requests(); track item.request.id) {
      <mat-card>
        <a [routerLink]="'/external-requests/' + item.request.id">
          {{ item.request.title }} / {{ item.current_step.role_code }}
        </a>
      </mat-card>
    }
  </div>
</app-widget-shell>
