<app-widget-shell
  title="Процесс"
  listRoute="/my-learning"
  [loading]="loading()"
  [error]="error()"
  [empty]="items().length === 0"
>
  <div widget-loading class="cards cards--skeleton">
    <div class="cards__skeleton"></div>
    <div class="cards__skeleton"></div>
  </div>

  <div class="tabs">
    @for (tab of tabs; track tab.key) {
      <button
        type="button"
        class="tabs__item"
        [class.tabs__item--active]="selectedTab() === tab.key"
        (click)="setTab(tab.key)"
      >
        {{ tab.label }}
        <span>{{ tabCount(tab.key) }}</span>
      </button>
    }
  </div>

  @if (filteredItems().length === 0) {
    <p class="cards__empty">В этой вкладке пока нет элементов.</p>
  } @else {
    <div class="cards">
      @for (item of filteredItems(); track item.id) {
        <article class="cards__item" [class.cards__item--overdue]="item.overdue">
          <a [routerLink]="'/learning/' + item.id" class="cards__title">
            {{ item.title }}
          </a>
          <div class="cards__meta">
            <span>{{ item.deadlineText }}</span>
            <span>{{ item.status }}</span>
          </div>
        </article>
      }
    </div>
  }
</app-widget-shell>
