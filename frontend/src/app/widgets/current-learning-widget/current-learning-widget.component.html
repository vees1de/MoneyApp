<app-widget-shell
  title="Курсы которые проходит"
  listRoute="/my-learning"
  [loading]="loading()"
  [error]="error()"
  [empty]="items().length === 0"
>
  <mat-list>
    @for (item of items(); track item.enrollment_id) {
      <mat-list-item>
        <div>
          <a [routerLink]="'/learning/' + item.enrollment_id"><strong>{{ item.title }}</strong></a>
          <mat-progress-bar mode="determinate" [value]="progressValue(item)"></mat-progress-bar>
          <small>Прогресс: {{ progressValue(item) }}%</small>
        </div>
      </mat-list-item>
    }
  </mat-list>
</app-widget-shell>
