<app-widget-shell
  title="Мои заявки"
  listRoute="/external-requests"
  [loading]="loading()"
  [error]="error()"
  [empty]="requests().length === 0"
>
  <mat-list>
    @for (request of requests(); track request.id) {
      <mat-list-item>
        <a [routerLink]="'/external-requests/' + request.id">
          <strong>{{ request.title }}</strong> — {{ request.status }}
        </a>
      </mat-list-item>
    }
  </mat-list>
</app-widget-shell>
