<app-widget-shell title="Быстрые действия" [loading]="loading()" [error]="error()">
  <div widget-loading class="quick-skeleton">
    <div class="quick-skeleton__summary"></div>
    <div class="quick-skeleton__actions">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <div class="summary">
    <span>Активные обучения: <strong>{{ activeLearning() }}</strong></span>
    <span>Открытые наборы: <strong>{{ openIntakes() }}</strong></span>
    <span>Мои заявки: <strong>{{ myApplications() }}</strong></span>
    <span>Мои предложения: <strong>{{ mySuggestions() }}</strong></span>
  </div>

  <div class="actions">
    @if (canManageIntakes()) {
      <button mat-stroked-button routerLink="/intakes/new">
        <mat-icon>playlist_add_check</mat-icon>
        Открыть набор
      </button>
    } @else {
      <button mat-stroked-button routerLink="/intakes">
        <mat-icon>search</mat-icon>
        Найти набор
      </button>
    }

    <button mat-stroked-button routerLink="/suggestions/new">
      <mat-icon>lightbulb</mat-icon>
      Предложить курс
    </button>

    <button mat-stroked-button routerLink="/applications/my">
      <mat-icon>fact_check</mat-icon>
      Мои заявки
    </button>

    <button mat-stroked-button routerLink="/my-learning">
      <mat-icon>school</mat-icon>
      Перейти к назначениям
    </button>

    @if (canReviewManager()) {
      <button mat-stroked-button routerLink="/applications/pending-manager">
        <mat-icon>approval</mat-icon>
        Апрув руководителя
      </button>
    }
  </div>
</app-widget-shell>
