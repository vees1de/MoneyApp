<app-widget-shell title="Быстрые действия" [loading]="loading()" [error]="error()">
  <div class="summary">
    <span>Активные обучения: <strong>{{ activeLearning() }}</strong></span>
    <span>Мои заявки: <strong>{{ myRequests() }}</strong></span>
  </div>

  <div class="actions">
    <button mat-stroked-button routerLink="/external-requests/new">Создать заявление</button>
    <button mat-stroked-button routerLink="/catalog">Назначить обучение</button>
    <button mat-stroked-button routerLink="/my-learning">Перейти к назначениям</button>
    <button mat-stroked-button routerLink="/catalog">Создать курс</button>
  </div>
</app-widget-shell>
