<app-widget-shell title="Быстрые действия" [loading]="loading()" [error]="error()">
  <p>Активные обучения: {{ activeLearning() }} · Мои заявки: {{ myRequests() }}</p>

  <div class="actions">
    <button mat-stroked-button routerLink="/external-requests/new">Подать заявку на курс</button>
    <button mat-stroked-button routerLink="/catalog">Найти обучение</button>
    <button mat-stroked-button routerLink="/my-learning">Мой план развития</button>
  </div>
</app-widget-shell>
