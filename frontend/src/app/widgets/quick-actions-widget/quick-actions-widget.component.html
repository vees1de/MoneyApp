<app-widget-shell title="Быстрые действия" [loading]="loading()" [error]="error()">
  <div widget-loading class="quick-skeleton">
    <div class="quick-skeleton__summary"></div>
    <div class="quick-skeleton__actions">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <div class="summary">
    <span>Активные обучения: <strong>{{ activeLearning() }}</strong></span>
    <span>Мои заявки: <strong>{{ myRequests() }}</strong></span>
  </div>

  <div class="actions">
    <button mat-stroked-button routerLink="/external-requests/new">
      <mat-icon>description</mat-icon>
      Создать заявление
    </button>
    <button mat-stroked-button routerLink="/catalog">
      <mat-icon>assignment_ind</mat-icon>
      Назначить обучение
    </button>
    <button mat-stroked-button routerLink="/my-learning">
      <mat-icon>school</mat-icon>
      Перейти к назначениям
    </button>
    <button mat-stroked-button routerLink="/catalog">
      <mat-icon>add_circle</mat-icon>
      Создать курс
    </button>
  </div>
</app-widget-shell>
