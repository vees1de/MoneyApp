<app-widget-shell
  title="Ближайшие события"
  listRoute="/calendar"
  [loading]="loading()"
  [error]="error()"
  [empty]="events().length === 0"
>
  <mat-list>
    @for (event of events(); track event.id) {
      <mat-list-item>
        <a routerLink="/calendar"><strong>{{ event.title }}</strong> ({{ eventSubtitle(event) }})</a>
      </mat-list-item>
    }
  </mat-list>
</app-widget-shell>
