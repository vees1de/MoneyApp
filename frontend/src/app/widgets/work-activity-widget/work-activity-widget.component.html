<app-widget-shell
  title="Рабочая активность"
  listRoute="/notifications"
  [loading]="loading()"
  [error]="error()"
  [empty]="notifications().length === 0"
>
  <div widget-loading class="work-skeleton">
    <div class="work-skeleton__item"></div>
    <div class="work-skeleton__item"></div>
    <div class="work-skeleton__item"></div>
  </div>

  <mat-list>
    @for (item of notifications(); track item.id) {
      <mat-list-item>
        <a [routerLink]="routeFor(item)"><strong>{{ item.title }}</strong> — {{ item.status }}</a>
      </mat-list-item>
    }
  </mat-list>
</app-widget-shell>
